.bg-overlay{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(70,185,200,.06) 0%,rgba(13,17,23,.7) 100%)}

/* TEASER TEXT */
.teaser{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.teaser-top{margin-bottom:3rem}
.tlogo{height:70px;width:auto;margin-bottom:1.5rem;filter:drop-shadow(0 0 20px rgba(70,185,200,.3))}
.tname{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;color:var(--white);letter-spacing:.04em;margin-bottom:.4rem}
.tname span{color:var(--cyan)}
.tsub{font-size:clamp(.85rem,2vw,1rem);color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

/* TEASER CARDS */
.tcards{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:3.5rem;max-width:700px}
.tcard{background:rgba(255,255,255,.04);border:1px solid rgba(70,185,200,.15);border-radius:10px;padding:.75rem 1.2rem;font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:.6rem}
.tcard svg{width:14px;height:14px;stroke:var(--cyan);fill:none;stroke-width:2;flex-shrink:0}

/* LOGIN BOX */
.login-box{background:rgba(20,27,36,.92);border:1px solid rgba(70,185,200,.2);border-radius:16px;padding:2rem 2.5rem;width:100%;max-width:400px;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,.5)}
.login-label{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;display:block}
.login-input-wrap{position:relative;margin-bottom:1rem}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:.82rem 3rem .82rem 1rem;color:var(--white);font-size:1rem;font-family:inherit;outline:none;transition:border-color .2s,background .2s}
.login-input:focus{border-color:var(--cyan);background:rgba(70,185,200,.05)}
.login-input::placeholder{color:var(--muted)}
.eye-btn{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:.2rem;transition:color .2s}
.eye-btn:hover{color:var(--white)}
.eye-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.login-err{font-size:.78rem;color:#e74c3c;margin-bottom:.8rem;display:none;text-align:center}
.login-err.show{display:block}
.login-btn{width:100%;background:var(--cyan);color:var(--dark);border:none;padding:.9rem;border-radius:8px;font-family:'Barlow',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:background .2s,transform .15s;letter-spacing:.02em}
.login-btn:hover{background:#5dd0de;transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-hint{text-align:center;margin-top:.9rem;font-size:.75rem;color:rgba(122,149,168,.6)}

/* RESPONSIVE */
@media(max-width:480px){
  .login-box{padding:1.75rem 1.5rem;border-radius:12px}
  .tcards{gap:.6rem}
  .tcard{font-size:.78rem;padding:.6rem 1rem}
}
@media(min-width:1400px){
  .tlogo{height:90px}
  .login-box{max-width:440px;padding:2.5rem 3rem}
}
/* TV / large screens */
@media(min-width:1800px){
  .tlogo{height:110px}
  .login-box{max-width:480px}
  .login-input{padding:1rem 3rem 1rem 1.1rem;font-size:1.1rem}
  .login-btn{padding:1rem;font-size:1.05rem}
}
</style>

<script>
// Simple SHA-256 implementation
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const CORRECT='52f8ece78099af2e10e4f7b162fd9cfc59a38c01d67f0ce2a1b6b8f0af4a871e';
const SESSION_KEY='wb_auth';

// Check if already logged in
if(sessionStorage.getItem(SESSION_KEY)==='1'){
  window.location.replace('index.html');
}

async function doLogin(){
  const pwd=document.getElementById('pwd').value;
  if(!pwd)return;
  const hash=await sha256(pwd);
  if(hash===CORRECT){
    sessionStorage.setItem(SESSION_KEY,'1');
    window.location.replace('index.html');
  } else {
    const err=document.getElementById('loginErr');
    err.classList.add('show');
    const inp=document.getElementById('pwd');
    inp.style.borderColor='#e74c3c';
    inp.value='';
    inp.focus();
    setTimeout(()=>{err.classList.remove('show');inp.style.borderColor='';},3000);
  }
}

function togglePwd(){
  const inp=document.getElementById('pwd');
  const show=document.getElementById('eyeShow');
  const hide=document.getElementById('eyeHide');
  if(inp.type==='password'){inp.type='text';show.style.display='none';hide.style.display='';}
  else{inp.type='password';show.style.display='';hide.style.display='none';}
}
</script>
